name: Deploy

on:
  push:
    branches: [master]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  PROJECT_ID: something-bot-338300
  REGION: europe-west4
  SERVICE_NAME: something-really-bot-cloudrun
  RUNTIME_SA: something-bot-cloudrun-sa@something-bot-338300.iam.gserviceaccount.com
  ARTIFACT_REPO: something-really-bot-artifacts
  IMAGE_NAME: something-really-bot

jobs:
  checks:
    uses: ./.github/workflows/_checks.yml
    secrets: inherit

  preflight:
    name: Deploy preflight (secrets configured?)
    runs-on: ubuntu-latest
    needs: checks
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - name: Check that GCP WIF secrets are set
        id: check
        env:
          WIF_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          DEPLOYER_SA: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT }}
        run: |
          if [ -n "${WIF_PROVIDER}" ] && [ -n "${DEPLOYER_SA}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Deploy skipped: GCP_WORKLOAD_IDENTITY_PROVIDER and/or GCP_DEPLOYER_SERVICE_ACCOUNT are unset. Complete the manual bootstrap from infra/terraform/README.md and set both repo secrets to enable Cloud Run deploys."
          fi

  deploy:
    name: Build, push, deploy
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.enabled == 'true'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to GCP via Workload Identity Federation
        # If this step fails, verify that:
        #   - Terraform from #8 has been applied against ${PROJECT_ID}.
        #   - The GCP_WORKLOAD_IDENTITY_PROVIDER and GCP_DEPLOYER_SERVICE_ACCOUNT
        #     repo secrets are set (terraform output -raw workload_identity_provider
        #     and deployer_service_account_email).
        # Do not fall back to JSON keys; the whole point is OIDC.
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute image references
        id: image
        run: |
          base="${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPO}/${IMAGE_NAME}"
          echo "sha_tag=${base}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${base}:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.sha_tag }}
            ${{ steps.image.outputs.latest_tag }}
          provenance: false

      - name: Resolve Cloud SQL instance connection name
        # POSTGRES_INSTANCE holds "project:region:instance" for the shared
        # Cloud SQL DB (#31). We read the latest version here so we can
        # pass it to --add-cloudsql-instances; the runtime *also* gets it
        # as an env var via --set-secrets so PostgresStorage can route
        # through the Auth Proxy socket at /cloudsql/<conn>/.
        id: cloudsql
        run: |
          conn=$(gcloud secrets versions access latest \
            --project="${PROJECT_ID}" --secret=POSTGRES_INSTANCE)
          echo "::add-mask::${conn}"
          echo "connection=${conn}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run
        # Secrets injected as env vars at this point:
        #   - TELEGRAM_WEBHOOK_SECRET (validated by the /webhook handler, #12)
        #   - TELEGRAM_BOT_TOKEN     (used by TelegramClient.send_message, #15)
        #   - TELEGRAM_QA_USERS      (parsed into the QA allowlist, #15)
        #   - OPENAI_API_KEY         (used by the OpenAI fallback handler, #23)
        #   - POSTGRES_DSN           (shared Cloud SQL connection string, #31)
        #   - POSTGRES_INSTANCE      (Cloud SQL instance conn name, #31;
        #                             also passed to --add-cloudsql-instances
        #                             so Cloud Run mounts the Auth Proxy socket)
        #   - SOMETHING_GROUP_CHAT_ID (FinCo daily stats digest target, #25)
        # Each --set-secrets value must already have at least one Secret
        # Manager version or the deploy will fail.
        run: |
          gcloud run deploy "${SERVICE_NAME}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --image="${{ steps.image.outputs.sha_tag }}" \
            --service-account="${RUNTIME_SA}" \
            --add-cloudsql-instances="${{ steps.cloudsql.outputs.connection }}" \
            --set-secrets="TELEGRAM_WEBHOOK_SECRET=telegram-webhook-secret-default:latest,TELEGRAM_BOT_TOKEN=telegram-bot-token-default:latest,TELEGRAM_QA_USERS=telegram-qa-users:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,POSTGRES_DSN=POSTGRES_DSN:latest,POSTGRES_INSTANCE=POSTGRES_INSTANCE:latest,SOMETHING_GROUP_CHAT_ID=SOMETHING_GROUP_CHAT_ID:latest" \
            --set-env-vars="SCHEDULER_SERVICE_ACCOUNT_EMAIL=something-bot-scheduler-sa@${PROJECT_ID}.iam.gserviceaccount.com,OPENAI_CONTEXT_BUCKET=something-bot-openai-context" \
            --quiet

      - name: Print deployed revision URL
        run: |
          gcloud run services describe "${SERVICE_NAME}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --format='value(status.url)'
